<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>
  <link rel="stylesheet" href="css/logReg.css">
</head>
<body>
  <div class="container">
    <h1>Library Portal</h1>
    <div class="container-wapper">
      <form class="forms">

        <label>Student Id:</label>
        <input class="input-username" type="text" placeholder="Enter Student-ID" required>

        <label>Password:</label>
        <input class="input-password" type="password" placeholder="Enter Password" required>

        <button class="btn-submit" type="submit">Login</button>
        <a class="btn-logReg" href="register.html">Register Here</a>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
