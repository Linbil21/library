<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register here</title>
  <link rel="stylesheet" href="css/logReg.css">
</head>
<body>
  <div class="container">
    <h1>Register here</h1>
    <div class="container-wapper">
      <form class="forms">
        <label>Student ID:</label>
        <input class="input-id" type="text" placeholder="Enter Student-ID" >

        <label>Student Name:</label>
        <input class="input-Studentname" type="text" placeholder="Enter Student Name" >

        <label>Email Address:</label>
        <input class="input-EmailAddress" type="email" placeholder="Enter Email Address" >

        <label>Password:</label>
        <input class="input-Password" type="password" placeholder="Enter Password" >

        <label>Confirm Password:</label>
        <input class="input-ConfirmPassword" type="password" placeholder="Confirm Password" >

        

        <button class="btn-submit" type="submit">Register</button>
        <a class="btn-logReg" href="login.html">Login Here</a>
      </form>
    </div>
  </div>


  <script src="js/Register.js"></script>
</body>
</html>
